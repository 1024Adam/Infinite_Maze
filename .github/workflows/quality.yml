name: Code Quality

on:
  push:
    branches: [master, dev/**]
  pull_request:
    branches: [master]

jobs:
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --with dev

      - name: black
        run: poetry run black --check infinite_maze/

      - name: flake8
        run: poetry run flake8 infinite_maze/

      - name: mypy
        run: poetry run mypy infinite_maze/
